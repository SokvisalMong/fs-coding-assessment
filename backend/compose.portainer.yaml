services:
  api:
    build: .
    container_name: todo-api
    ports:
      - "8888:8000"
    environment:
      # Required settings for the FastAPI App
      - DATABASE_URL=postgresql+asyncpg://postgres:password@host.docker.internal:5432/dev_todo_db
      - SECRET_KEY=${SECRET_KEY:-6cd4c0a21ad4e99e704e94ca67822837f64dd92243676c780577ce65a91a464c}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - APP_NAME=${APP_NAME:-Todo API}
      - DEBUG=${DEBUG:-True}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-5}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW:-10}
      - DATABASE_POOL_TIMEOUT=${DATABASE_POOL_TIMEOUT:-30}
      - DATABASE_POOL_RECYCLE=${DATABASE_POOL_RECYCLE:-3600}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
